<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaPoint | Home </title>
    <link rel="stylesheet" href="../assets/styles.css">
    <link rel="shortcut icon" href="../img/BananaPoint.ico" type="image/x-icon">
    <script defer src="../app.js></script>
</head>
<body>
    <div class="homepage">
        <header class="homepage__banners">
            <!-- Slideshow de Banners -->
            <div class="banners__slideshow">
                <div class="banner-slide" style="background-image: url('../img/banner-chainsaw-man.png')"></div>
                <div class="banner-slide" style="background-image: url('../img/banner-dandadan.png')"></div>
                <div class="banner-slide" style="background-image: url('../img/banner-jujutsu.png')"></div>
                <div class="banner-slide" style="background-image: url('../img/banner-mob-psycho-100.png')"></div>
                <div class="banner-slide" style="background-image: url('../img/banner-solo-leveling.png')"></div>
            </div>

            <div class="cabecalho__conteudo">
                <div class="cabecalho__nav">
                    <nav class="links__nav">
                    <a href="#" class="logo"><img src="../img/bananapoint-logo.png" alt="" height="80rem"></a>
                    <ul class="nav-list">
                        <li><a href="#" class="categorias__links">Filmes</a></li>
                        <li><a href="#" class="categorias__links">Animes</a></li>
                        <li><a href="#" class="categorias__links">Mangás</a></li>
                    </ul>       
                    </nav>
                </div>
                <div class="container__icones">
                    <div class="container__pesquisa">
                        <input type="text" class="barra__pesquisa" placeholder="Pesquisar...">
                        <a class="botao__pesquisa">
                            <img src="../img/icones-lupa-roxa.png" alt="" class="lupa__roxa" width="25px" height="25px">
                            <img src="../img/icones-lupa-branca.png" alt="" class="lupa__branca" width="25px" height="25px">
                        </a>
                    </div>
                    <div>
                        <button class="favoritos_btn"> <img src="../img/icones-favoritos.png" alt="Favoritos" height="50px"></button>
                        <button class="perfil__btn"> <img src="../img/icones-perfil.png" alt="Perfil de Usuário" height="50px"></button>
                        
                    </div>
                </div>
            </div>
            <hr class="divisoria">
            
        </header>

        <!-- o label representa LEGENDAS para os inputs radios logo acima, ou seja quando se clica no "botão 1" o radio1 será selecionado, o htmml vai identificar q a legenda puxa o radio 1 por conta do atributo "for" onde ele aponta para o id do input radio-->

    </div>
</body>
</html>
