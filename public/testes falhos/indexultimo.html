<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaPoint | Home </title>
    <link rel="stylesheet" href="./assets/styles.css">
    <link rel="shortcut icon" href="./img/BananaPoint.ico" type="image/x-icon">
</head>
<body>
    <header class="cabecalho__homepage">
        
        
        <div class="conteudo">
            <div class="slides">
                <input type="radio" name="radio" id="radio1" checked>
                <input type="radio" name="radio" id="radio2">
                <input type="radio" name="radio" id="radio3">
                <input type="radio" name="radio" id="radio4">
                <input type="radio" name="radio" id="radio5">

                <div class="slide s1">
                    <img src="./img/banner-chainsaw-man.png" alt="banner de chainsaw man">
                </div>

                <div class="slide">
                    <img src="./img/banner-dandadan.png" alt="banner de dandadan">
                </div>

                <div class="slide">
                    <img src="./img/banner-jujutsu.png" alt="banner de jujutsu kaisen">
                </div>

                <div class="slide">
                    <img src="./img/banner-mob-psycho-100.png" alt="banner de mob psycho 100">
                </div>

                <div class="slide">
                    <img src="./img/banner-solo-leveling.png" alt="banner de solo leveling">
                </div>

            </div>
            <div class="navegacao">
                <label class="botao__navegacao" for="slide1"></label>
                <label class="botao__navegacao" for="slide2"></label>
                <label class="botao__navegacao" for="slide3"></label>
                <label class="botao__navegacao" for="slide4"></label>
                <label class="botao__navegacao" for="slide5"></label>

            </div>


        </div>
        
    </header>
    
</body>
</html>
